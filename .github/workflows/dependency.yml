where to put the .clang-format

Short and clear 👇
✅ Where to put .clang-format

👉 Put .clang-format in the root of your repository

your-repo/
├── .clang-format   👈 HERE
├── negarr.cpp
├── proxy.cpp
├── testq1.cpp
└── .github/
    └── workflows/
        └── lint.yml

This is the default and recommended location.
🧠 Why the repo root?

clang-format (and Super-Linter) works like this:

    Start from the file being checked

    Look upward through parent directories

    Stop at the first .clang-format found

Putting it at the root means:

    One consistent style for the whole project

    No surprises

    Easy for students to understand

📁 Advanced (optional, but teachable)

You can put different .clang-format files in subfolders:

src/.clang-format
tests/.clang-format

But:

    This is advanced usage

    Can confuse beginners

    Rarely needed in teaching projects

👉 For classes: one file at the root is best
🧪 How to verify it’s being used (quick test)

    Intentionally break formatting in a .cpp

    Push the commit

    Super-Linter should fail

    Logs will say:

    clang-format failed on file: testq1.cpp

That confirms .clang-format is picked up.
📌 Slide-ready takeaway

    .clang-format lives at the project root so every C++ file follows the same rules.

