I got an error Unable to download artifact(s): Artifact not found for name: build-output

Ah — this is a classic multi-job artifact pitfall. You didn’t do anything “wrong”; GitHub Actions is just very literal 😄
Let’s walk it through cleanly.
❌ Why this error happens

Unable to download artifact(s): Artifact not found for name: build-output

This means the artifact was never successfully uploaded in the build job.

The most common reasons are:
1️⃣ build job failed → artifact step never ran

If compilation fails, this step is skipped:

- name: upload build output
  uses: actions/upload-artifact@v4

👉 Check:
Actions → build job → compile step
Make sure g++ succeeded.
2️⃣ Artifact path does not exist

If main was not created, upload silently fails.

Your upload step:

path: main

But if compilation failed or output name differs → no artifact.
3️⃣ Artifact name mismatch

Upload:

name: build-output

Download must match exactly (case-sensitive):

name: build-output

✅ Robust FIX (recommended for teaching)
🔧 Build job – upload everything explicitly

This guarantees the artifact exists.

      - name: compile
        run: |
          g++ -std=c++11 negarr.cpp proxy.cpp testq1.cpp -o main
          ls -l   # 👈 sanity check

      - name: upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            main
            *.cpp

🔧 Package job – download artifact

      - name: download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

After download, files will be in the current directory.
🔧 Zip step (safe version)

      - name: create zip
        run: |
          ls -l   # 👈 confirm files exist
          zip submission.zip *.cpp main

🧠 Debug checklist (teach this!)

If this ever happens again, check in order:

    ✅ Did the build job succeed?

    ✅ Did the artifact upload step run?

    ✅ Does the path exist?

    ✅ Does the artifact name match exactly?

⭐ Pro teaching tip

For CI lessons, I often add:

if: always()

to the upload step so students still get artifacts even if compile fails:

- name: upload build output
  if: always()
  uses: actions/upload-artifact@v4
  with:
    name: build-output
    path: .

