make another job that depends on build to zip all source code and compiled code

Nice, this is a very clean CI teaching example 👍
We’ll add a second job that:

    depends on build (needs: build)

    zips all source code + compiled binary

    uploads the zip as an artifact

✅ Updated GitHub Action (with dependent zip job)

name: build code

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compile
        run: |
          g++ -std=c++11 negarr.cpp proxy.cpp testq1.cpp -o main

      - name: upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: main

  package:
    needs: build   # 👈 depends on build job
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: create zip
        run: |
          zip -r submission.zip \
            *.cpp \
            main

      - name: upload zip
        uses: actions/upload-artifact@v4
        with:
          name: submission
          path: submission.zip

🧠 What this teaches students really well

    Job dependency → needs: build

    Artifacts as the way to pass files between jobs

    Separation of concerns

        build → compile

        package → prepare deliverable

📦 Result

After the workflow finishes:

    Artifact submission contains:

        all *.cpp source files

        compiled binary main

