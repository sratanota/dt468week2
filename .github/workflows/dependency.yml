change the .clang-format to use google c++ style

Yep 👍 — easy change.
✅ .clang-format using Google C++ Style

Put this file at the root of your repository and replace the content with:

# .clang-format
BasedOnStyle: Google

IndentWidth: 2
ColumnLimit: 80

AllowShortFunctionsOnASingleLine: Empty
AllowShortIfStatementsOnASingleLine: false
DerivePointerAlignment: false
PointerAlignment: Left

SpacesBeforeTrailingComments: 2
SortIncludes: true

🧠 What this means (in Google-style terms)

    BasedOnStyle: Google
    → Uses Google C++ Style Guide defaults

    IndentWidth: 2
    → Matches Google’s 2-space indentation

    ColumnLimit: 80
    → Google’s recommended line length

    PointerAlignment: Left
    → int* ptr (Google style)

    SortIncludes: true
    → Enforces deterministic include order

🧪 How to verify it works

    Format a file locally (optional):

    clang-format -i testq1.cpp

    Push code with bad formatting

    Super-Linter should:

        ❌ Fail the workflow

        Show Google-style violations in logs

📌 Slide-ready takeaway

    Google style is enforced by .clang-format;
    Super-Linter only applies it automatically in CI.

Teaching tip

This is a great moment to show:

    Style guide (document) → Google C++ Style

    Enforcer (tool) → clang-format

    Gatekeeper (CI) → Super-Linter

