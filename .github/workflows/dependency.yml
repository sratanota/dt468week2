where will I see the zip file

Good question — this part is not obvious the first time 👍
📍 Where the zip file appears

You’ll find the zip inside the GitHub Actions run, as an artifact.
Step-by-step

    Go to your GitHub repository

    Click Actions

    Click the workflow run (e.g. build code)

    Scroll to the bottom of the page

    Look for Artifacts

You should see something like:

Artifacts
├── build-output
└── submission   ← 👈 this is your zip

Click submission → GitHub downloads submission.zip to your computer.
🧠 Why it’s there (important concept)

    Jobs run on temporary GitHub runners

    Files disappear after the job finishes

    Artifacts are how you keep files after the run

This is exactly how:

    CI systems hand off binaries

    Students submit compiled work

    Releases are prepared before publishing

⏳ How long it stays

    Artifacts are kept for 90 days by default

    You can change this with:

    with:
      retention-days: 7

