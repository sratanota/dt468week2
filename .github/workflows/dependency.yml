Short answer: yes, it’s because you have 2 jobs — but the real issue is that you never uploaded the artifact in the first job.
needs: build only controls order, it does not share files automatically.

Let’s fix it properly 👇
❌ What’s wrong in your workflow

In build job, you compile:

- name: compile
  run: 
     g++ -std=c++11 negarr.cpp proxy.cpp testq1.cpp -o main

But you never upload main as an artifact.

So in package job, this step:

uses: actions/download-artifact@v4
with:
  name: build-output

fails because build-output does not exist.
✅ How GitHub Actions really works (key concept)

    Each job runs on a different machine

    Files do not persist between jobs

    To pass files between jobs, you must use artifacts

    needs: ≠ file sharing

✅ Corrected workflow (minimal changes)
✔ Fixed version that works

name: build code

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: compile
        run: |
          g++ -std=c++11 negarr.cpp proxy.cpp testq1.cpp -o main

      - name: upload build output   # 👈 THIS WAS MISSING
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: main

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: create zip
        run: |
          zip submission.zip *.cpp main

      - name: upload zip
        uses: actions/upload-artifact@v4
        with:
          name: submission
          path: submission.zip

🧠 Mental model (very important)

Think of jobs like this:

Job: build     (Machine A)
  └─ main  ──► upload artifact ──┐
                                 │
Job: package  (Machine B) ◄──────┘
  └─ download artifact → zip

No upload → nothing to download → ❌ error.
