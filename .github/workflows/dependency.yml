if it is because of write why actions/upload-artifact@v4 don't need it as well

This is an excellent, subtle question. You’re now touching the boundary between GitHub Actions runtime and GitHub API usage — most people never notice this distinction.
Short answer (slide-ready)

    upload-artifact does not need GITHUB_TOKEN because it writes to the workflow runtime, not to the GitHub repository or API.

Super-Linter writes repository state.
Artifact upload writes job output.

Different systems. Different security models.
1️⃣ Two different “write targets” in GitHub Actions
A. Writing to the workflow runtime

Examples:

    actions/upload-artifact

    actions/download-artifact

    Logs

    Step outputs

These write to:

    The Actions execution environment

    Managed internally by GitHub

🔐 No repository mutation
🔐 No API permission required
B. Writing to the GitHub repository / API

Examples:

    Super-Linter

    Posting PR comments

    Creating releases

    Updating commit status

These require:

    Authentication

    Explicit permissions

    GITHUB_TOKEN

2️⃣ Why upload-artifact doesn’t need GITHUB_TOKEN

This step:

- uses: actions/upload-artifact@v4

Uploads files to:

    The workflow run storage

    Scoped to that single run

    Auto-expiring

It does not:

    Modify commits

    Comment on PRs

    Change repo contents

    Touch GitHub Issues / Statuses

So GitHub allows it without explicit authentication.
3️⃣ Internal model (important mental shift)

Think of GitHub Actions as having two security zones:

┌──────────────────────────────┐
│  GitHub Repository / API     │  ← requires GITHUB_TOKEN
│  - Commits                   │
│  - PRs                       │
│  - Status checks             │
└──────────────────────────────┘
             ▲
             │
        requires auth
             │
┌──────────────────────────────┐
│  GitHub Actions Runtime      │  ← no token needed
│  - Artifacts                 │
│  - Logs                      │
│  - Step outputs              │
└──────────────────────────────┘

4️⃣ Why Super-Linter must use the API

Super-Linter needs to:

    Set commit status (success / failure)

    Integrate with PR checks

    Appear in GitHub UI

All of these are repository metadata, not runtime data.

Thus:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

5️⃣ Why checkout also feels “special”

actions/checkout:

    Reads repository content

    Uses an implicitly injected token

    Does not modify repo state

This is why it works “without configuration”.
6️⃣ Rule of thumb (great for slides)

    If an action affects the repository or PR UI → needs GITHUB_TOKEN.
    If it only affects the workflow run → no token required.

Examples:
Action	Needs Token?	Why
checkout	❌ (implicit)	read-only
upload-artifact	❌	runtime storage
download-artifact	❌	runtime storage
super-linter	✅	status / PR feedback
create-release	✅	repository mutation
7️⃣ Why GitHub designed it this way

Security goals:

    Prevent silent repo modification

    Minimize token exposure

    Make dangerous operations explicit

    Keep CI ergonomics simple

This is very intentional, not an inconsistency.
8️⃣ One-line takeaway (perfect closing slide)

    Artifacts belong to the workflow.
    Statuses belong to the repository.
    Only the repository needs a token.

