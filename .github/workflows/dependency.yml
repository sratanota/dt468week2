update github action to allow mannual trigger

Easy one 👍
To allow manual trigger in GitHub Actions, you just need to add workflow_dispatch to the on: section.

Here’s your updated GitHub Action with manual trigger enabled:

name: Compile C++ with g++

on:
  push:
  pull_request:
  workflow_dispatch:   # 👈 allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile main.cpp
        run: g++ -std=c++17 main.cpp -o main

How to use the manual trigger

    Go to your GitHub repository

    Click Actions

    Select Compile C++ with g++

    Click Run workflow

    Choose branch (if needed) → Run workflow

Optional: manual trigger with inputs (nice for teaching 🎓)

If you want students to experiment:

workflow_dispatch:
  inputs:
    cpp_standard:
      description: "C++ standard"
      required: true
      default: "c++17"

Then use it in run:

run: g++ -std=${{ inputs.cpp_standard }} main.cpp -o main

