Why run: | matters

    run: without | expects a single-line command

    | tells YAML: “everything below is literal shell code”

Even with one command, this is a good habit—especially for teaching or future expansion.
Result

    ✅ Runs on push to main

    ✅ Can be triggered manually from Actions → Run workflow

    ✅ YAML is valid and future-proof

