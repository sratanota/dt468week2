FILTER_REGEX_INCLUDE: .*\.cpp|.*\.h|.*\.hpp should be add to .clang-format , right?

Great catch — and no, that’s a very common confusion 👍
Let’s clear it up cleanly.
❌ No — FILTER_REGEX_INCLUDE does NOT go in .clang-format
Why?

Because they belong to two different tools:
Item	Belongs to	Purpose
.clang-format	clang-format	How C++ code should look
FILTER_REGEX_INCLUDE	Super-Linter / GitHub Actions	Which files to check
✅ Correct placement
1️⃣ .clang-format (formatting rules only)

📍 File: .clang-format (repo root)

BasedOnStyle: LLVM
IndentWidth: 2
ColumnLimit: 100
AllowShortFunctionsOnASingleLine: Empty

👉 No file filters here.
2️⃣ FILTER_REGEX_INCLUDE (workflow file)

📍 File: .github/workflows/lint.yml

- name: Run Super-Linter
  uses: github/super-linter@v6
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    VALIDATE_CPP: true
    VALIDATE_CLANG_FORMAT: true
    FILTER_REGEX_INCLUDE: .*\.cpp|.*\.h|.*\.hpp

This tells Super-Linter:

    “Only run linters on files matching these patterns.”

🧠 Mental model (students remember this)

    .clang-format → style rules

    FILTER_REGEX_INCLUDE → file selection

    Different layers, different responsibilities

🎯 Why this separation exists

    clang-format is language-specific

    Super-Linter is language-agnostic

    File filtering must happen before the formatter runs

This is good software design in action.
📌 Slide-ready one-liner

    .clang-format defines the rules.
    Super-Linter decides where to apply them.

⚠️ Common student mistake (worth a slide!)

❌ Putting CI configuration inside tool config files
❌ Mixing formatting rules with workflow logic

✅ Keep:

    Tool config → tool files

    CI config → workflow YAML

