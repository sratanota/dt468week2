create an example action that use super-linter to check c++ code format

Here’s a clean, minimal, teaching-friendly GitHub Action that uses Super-Linter to check C++ code formatting/style 👍
This is exactly how it’s done in real projects.
✅ Example: Super-Linter for C++ Code

name: C++ Linting with Super-Linter

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  statuses: write   # 👈 required for reporting results

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Super-Linter (C++)
        uses: github/super-linter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ---- Super-Linter configuration ----
          VALIDATE_CPP: true          # enable C++ linting
          VALIDATE_CLANG_FORMAT: true # check code formatting
          DEFAULT_BRANCH: main

🧠 What this actually checks for C++

Super-Linter will:

    Run clang-format on .cpp, .h, .hpp

    Check formatting consistency

    Fail the workflow if formatting rules are violated

    Report status back to GitHub (✔ / ✘ on commits & PRs)

📌 It does not compile your code — only checks style.
📁 Important: .clang-format file (required!)

Super-Linter expects formatting rules.
Add this file at the repository root:

# .clang-format
BasedOnStyle: LLVM
IndentWidth: 2
ColumnLimit: 100
AllowShortFunctionsOnASingleLine: Empty

Without this file:

    Super-Linter still runs

    But formatting behavior may be unclear or inconsistent

🧪 What students will see when it fails

    ❌ Workflow marked as failed

    ❌ Red ❌ on commit / PR

    Logs showing which file & line violate format

    No changes are made automatically

👉 This teaches CI as an enforcer, not an editor.
🔐 Why GITHUB_TOKEN is required here

Super-Linter needs it to:

    Report status checks

    Integrate with PR UI

Even though checkout works without it, reporting does not.
🧩 Optional (nice teaching extensions)
Only lint C++ files

FILTER_REGEX_INCLUDE: .*\.cpp|.*\.h|.*\.hpp

Fail fast (stop on first error)

FAIL_FAST: true

Lint only changed files (PRs)

VALIDATE_ALL_CODEBASE: false

🧠 Slide-ready summary

    Super-Linter = style gatekeeper

    .clang-format defines the rules

    GITHUB_TOKEN enables GitHub integration

    CI fails → developer must fix formatting

